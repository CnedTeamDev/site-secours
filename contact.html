<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <header>
        <h1>Cned</h1>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="https://eformation.cned.fr/">Espace de formation</a></li>
                <li><a href="https://www.cned.fr/sites/cned.fr/files/pdf/cgv/CNED_CGV-CGU_2026_V01_1-avril.pdf">Offre de
                        formation</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Contact</h1>
        <form action="/submit_contact" method="POST" aria-labelledby="contact-form">
            <label for="name">Nom :</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Téléphone d'urgence :</label>
            <input type="tel" id="phone" name="phone" pattern="^\d{10}$" required>

            <label for="message">Votre message :</label>
            <textarea id="message" name="message" required></textarea>

            <input type="submit" value="Envoyer">
        </form>

        <section>
            <h2>Coordonnées</h2>
            <p>Email : urgence@example.com</p>
            <p>Téléphone : +33 5 00 00 00 00</p>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Cned</p>
    </footer>
</body>

</html>

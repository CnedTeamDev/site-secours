---
layout: default
title: "Accueil"
---
{% assign sorted_posts = site.posts | sort: 'date' | reverse %}
{% for post in sorted_posts %}
<article class="alerte" style="margin-bottom:2em;">
    <header>
        <h2>{{ post.title }}</h2>
    </header>
    <p class="alerte-date"><em>{{ post.date | date: '%d/%m/%Y %H:%M' }}</em></p>
    <div class="alerte-contenu">
        {{ post.content }}
    </div>
</article>
{% endfor %}

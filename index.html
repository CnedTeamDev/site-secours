<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cned</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
    <header>
        <h1>Cned</h1>
        <nav>
            <ul>
                <li><a href="index.html">Accueil</a></li>
                <li><a href="https://eformation.cned.fr/">Espace de formation</a></li>
                <li><a href="https://www.cned.fr/sites/cned.fr/files/pdf/cgv/CNED_CGV-CGU_2026_V01_1-avril.pdf">Offre de
                        formation</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        {% assign sorted_posts = site.posts | sort: 'date' | reverse %}
        {% for post in sorted_posts %}
        <article style="border:1px solid #ccc; margin-bottom:2em; padding:1em;">
            <h2>{{ post.title }}</h2>
            <p><em>{{ post.date | date: '%d/%m/%Y %H:%M' }}</em></p>
            <div>
                {{ post.content }}
            </div>
        </article>
        {% endfor %}
    </main>
    <footer>
        <p>&copy; 2026 Cned</p>
    </footer>
</body>

</html>

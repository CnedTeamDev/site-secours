---
layout: default
title: "Accueil"
---
{% assign sorted_posts = site.posts | sort: 'date' | reverse %}
{% for post in sorted_posts %}
<article class="post-block type-{{ post.type | default: 'neutre' }}">
    <header>
        <h2>{{ post.title }}</h2>
    </header>
    <p class="post-date"><em>{{ post.date | date: '%d/%m/%Y %H:%M' }}</em></p>
    <div class="post-content">
        {{ post.content }}
    </div>
</article>
{% endfor %}

---
layout: default
title: "Alertes"
---

<h1>Alertes</h1>

{% assign sorted_posts = site.posts | sort: 'date' | reverse %}
{% for post in sorted_posts %}
  <article style="border:1px solid #ccc; margin-bottom:2em; padding:1em;">
    <h2>{{ post.title }}</h2>
    <p><em>{{ post.date | date: '%d/%m/%Y %H:%M' }}</em></p>
    <div>
      {{ post.content }}
    </div>
  </article>
{% endfor %}
